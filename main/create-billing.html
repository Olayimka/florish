<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Billing Details | Flourish Poppies</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-[#fffaf5] text-gray-800">
  <nav class="bg-white/95 shadow-sm sticky top-0 z-50 backdrop-blur">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-3">
      <a href="index.html" class="flex items-center gap-3 min-w-0">
        <img src="assest/logo.png" alt="Flourish Poppies logo" class="h-14 w-14 rounded-full object-contain border border-amber-200 bg-white p-1 shadow-sm" />
        <h2 class="heading text-lg sm:text-2xl font-bold text-blue-900 truncate">Flourish Poppies</h2>
      </a>
    </div>
  </nav>

  <main class="py-16">
    <div class="max-w-2xl mx-auto rounded-3xl bg-white p-8 shadow-xl">
      <p class="text-xs uppercase tracking-[0.35em] text-blue-800">Checkout</p>
      <h1 class="heading text-3xl font-bold text-blue-950 mt-3">Billing Details</h1>
      <p class="mt-3 text-gray-600">Add your delivery information to continue to payment.</p>

      <form id="billingForm" class="mt-8 space-y-4">
        <input id="name" type="text" placeholder="Full Name" required class="w-full rounded-2xl border border-gray-200 p-3 focus:outline-none focus:ring-2 focus:ring-blue-200" />
        <input id="email" type="email" placeholder="Email" required class="w-full rounded-2xl border border-gray-200 p-3 focus:outline-none focus:ring-2 focus:ring-blue-200" />
        <input id="phone" type="tel" placeholder="Phone Number" required class="w-full rounded-2xl border border-gray-200 p-3 focus:outline-none focus:ring-2 focus:ring-blue-200" />
        <textarea id="address" rows="4" placeholder="Address" required class="w-full rounded-2xl border border-gray-200 p-3 focus:outline-none focus:ring-2 focus:ring-blue-200"></textarea>
        <button class="w-full rounded-2xl bg-blue-800 px-5 py-3 font-semibold text-white hover:bg-blue-900">Continue to payment</button>
      </form>
    </div>
  </main>

  <script>
    document.getElementById('billingForm').addEventListener('submit', function (event) {
      event.preventDefault();
      const data = {
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        address: document.getElementById('address').value.trim()
      };

      localStorage.setItem('billingInfo', JSON.stringify(data));
      window.location.href = 'create-payemt.html';
    });
  </script>
</body>
</html>
