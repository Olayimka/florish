<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment | Flourish Poppies</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-[#fffaf5] text-gray-800">
  <nav class="bg-white/95 shadow-sm sticky top-0 z-50 backdrop-blur">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-3">
      <a href="index.html" class="flex items-center gap-3 min-w-0">
        <img src="assest/logo.png" alt="Flourish Poppies logo" class="h-14 w-14 rounded-full object-contain border border-amber-200 bg-white p-1 shadow-sm" />
        <h2 class="heading text-lg sm:text-2xl font-bold text-blue-900 truncate">Flourish Poppies</h2>
      </a>
    </div>
  </nav>

  <main class="flex min-h-[70vh] items-center justify-center px-4 py-16">
    <div class="w-full max-w-xl rounded-3xl bg-white p-8 text-center shadow-xl">
      <p class="text-xs uppercase tracking-[0.35em] text-blue-800">Checkout</p>
      <h1 class="heading text-3xl font-bold text-blue-950 mt-3">Complete Payment</h1>
      <p class="mt-3 text-gray-600">Your order is almost ready. Confirm the payment to finish checkout.</p>
      <div id="paymentSummary" class="mt-8 rounded-2xl bg-blue-50 p-5 text-left"></div>
      <button id="payNow" class="mt-8 w-full rounded-2xl bg-green-600 px-5 py-3 font-semibold text-white hover:bg-green-700">Pay Now</button>
    </div>
  </main>

  <script>
    function formatPrice(value) {
      return new Intl.NumberFormat('en-NG', { style: 'currency', currency: 'NGN', maximumFractionDigits: 0 }).format(value || 0);
    }

    function payNow() {
      const billing = JSON.parse(localStorage.getItem('billingInfo') || '{}');
      const cart = JSON.parse(localStorage.getItem('flourishCart') || '[]');
      const total = cart.reduce((sum, item) => sum + Number(item.price || 0) * Number(item.qty || 1), 0);
      localStorage.setItem('paymentReference', `FLR-${Date.now()}`);
      localStorage.setItem('lastOrder', JSON.stringify({ billing, cart, total }));
      window.location.href = 'success.html';
    }

    const summary = document.getElementById('paymentSummary');
    const cart = JSON.parse(localStorage.getItem('flourishCart') || '[]');
    const total = cart.reduce((sum, item) => sum + Number(item.price || 0) * Number(item.qty || 1), 0);
    summary.innerHTML = `
      <p class="text-sm font-semibold text-blue-950">Estimated total</p>
      <p class="mt-2 text-3xl font-bold text-blue-900">${formatPrice(total)}</p>
      <p class="mt-3 text-sm text-gray-600">${cart.length ? `${cart.length} item${cart.length > 1 ? 's' : ''} ready for delivery` : 'No items in cart'}</p>
    `;

    document.getElementById('payNow').addEventListener('click', payNow);
  </script>
</body>
</html>
