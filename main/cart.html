<html lang="en">
<head>
  <meta charset="UTF-8" />

<body class="bg-[#fffaf5] text-gray-800">
  <nav class="bg-white/95 shadow-sm sticky top-0 z-50 backdrop-blur">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-3">
      <a href="index.html" class="flex items-center gap-3 min-w-0"><img src="assest/logo.png" alt="Flourish Poppies logo" class="h-14 w-14 rounded-full object-contain border border-amber-200 bg-white p-1 shadow-sm" /><h2 class="heading text-lg sm:text-2xl font-bold text-blue-900 truncate">Flourish Poppies</h2></a>
      <ul class="hidden md:flex gap-6 text-gray-700 font-medium"><li><a href="index.html">Home</a></li><li><a href="about.html">About</a></li><li><a href="shop.html">Shop</a></li><li><a href="gallery.html">Gallery</a></li><li><a href="consultation.html">Consultation</a></li><li><a href="contact.html">Contact</a></li></ul>
      <div class="flex items-center gap-3"><button id="menuBtn" class="md:hidden inline-flex h-11 w-11 items-center justify-center rounded-xl border border-blue-100 bg-blue-50 text-blue-900 text-xl shadow-sm" aria-label="Open menu" aria-expanded="false">☰</button><a href="shop.html" class="hidden sm:inline-flex bg-blue-800 text-white px-5 py-3 rounded-xl hover:bg-blue-900 transition shadow-sm">Continue shopping</a></div>
    </div>
    <div id="mobileMenu" class="md:hidden hidden border-t border-blue-100 bg-white/95 backdrop-blur"><div class="max-w-7xl mx-auto px-4 py-4 space-y-2"><a href="index.html" class="block px-4 py-3 rounded-xl hover:bg-blue-50 hover:text-blue-800">Home</a><a href="about.html" class="block px-4 py-3 rounded-xl hover:bg-blue-50 hover:text-blue-800">About</a><a href="shop.html" class="block px-4 py-3 rounded-xl hover:bg-blue-50 hover:text-blue-800">Shop</a><a href="gallery.html" class="block px-4 py-3 rounded-xl hover:bg-blue-50 hover:text-blue-800">Gallery</a><a href="consultation.html" class="block px-4 py-3 rounded-xl hover:bg-blue-50 hover:text-blue-800">Consultation</a><a href="contact.html" class="block px-4 py-3 rounded-xl hover:bg-blue-50 hover:text-blue-800">Contact</a></div></div>
  </nav>

  <main class="py-16 bg-[#f7f3ef]">
    <div class="max-w-7xl mx-auto px-6 grid lg:grid-cols-[1.1fr_0.7fr] gap-8">
      <section class="rounded-3xl bg-white p-6 shadow-xl">
        <p class="text-xs uppercase tracking-[0.35em] text-blue-800">Cart</p>
        <h1 class="heading text-3xl md:text-4xl font-bold text-blue-950 mt-3">Your selected beauty items</h1>
        <div id="cartItems" class="mt-8 space-y-4"></div>
      </section>
      <aside class="rounded-3xl bg-blue-950 text-white p-6 shadow-xl h-fit">
        <h2 class="heading text-2xl font-semibold">Summary</h2>
        <p id="cartCount" class="mt-2 text-gray-200">0 items</p>
        <div class="mt-6 border-t border-white/10 pt-4 flex items-center justify-between text-lg font-semibold"><span>Subtotal</span><strong id="cartSubtotal">₦0</strong></div>
        <a href="checkout-email.html"
class="mt-6 inline-flex w-full justify-center rounded-2xl bg-amber-300 text-blue-950 px-5 py-3 font-semibold hover:bg-amber-200 transition">
Proceed to Check Out
</a>
      </aside>
    </div>
  </main>

  <footer class="footer-small bg-blue-950 text-white">
    <div class="max-w-6xl mx-auto px-6 py-8 flex flex-col items-center gap-5">
      <p class="text-sm text-white/80">@flourish poppies 2026 · All rights reserved</p>
      <div class="flex items-center gap-4 social-links">
        <a href="#" aria-label="Instagram" class="inline-flex h-11 w-11 items-center justify-center rounded-full bg-white/10 text-white/90 hover:bg-white/20 transition">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="h-5 w-5">
            <path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2Zm0 1.5A4.25 4.25 0 0 0 3.5 7.75v8.5A4.25 4.25 0 0 0 7.75 20.5h8.5A4.25 4.25 0 0 0 20.5 16.25v-8.5A4.25 4.25 0 0 0 16.25 3.5h-8.5Zm8.25 2.5a1 1 0 1 1 0 2 1 1 0 0 1 0-2ZM12 7.25a4.75 4.75 0 1 1 0 9.5 4.75 4.75 0 0 1 0-9.5Zm0 1.5a3.25 3.25 0 1 0 0 6.5 3.25 3.25 0 0 0 0-6.5Z" />
          </svg>
        </a>
        <a href="#" aria-label="Facebook" class="inline-flex h-11 w-11 items-center justify-center rounded-full bg-white/10 text-white/90 hover:bg-white/20 transition">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="h-5 w-5">
            <path d="M13.5 22V13.5h3.45l.52-3.9h-3.97V6.6c0-1.13.32-1.9 1.96-1.9h2.09V1.1h-2.86c-3.57 0-4.22 1.7-4.22 4.18v2.32H7.5v3.9h3.4V22h3.6Z" />
          </svg>
        </a>
        <a href="#" aria-label="TikTok" class="inline-flex h-11 w-11 items-center justify-center rounded-full bg-white/10 text-white/90 hover:bg-white/20 transition">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="h-5 w-5">
            <path d="M17.07 4.5a4.78 4.78 0 0 1-1.87-.38v7.59a3.38 3.38 0 1 1-3.44-3.38h1.1c.6 0 1.17.13 1.69.37V3.35h1.52v1.15Zm-5.85 16.67a3.25 3.25 0 1 0 0-6.5 3.25 3.25 0 0 0 0 6.5Z" />
          </svg>
        </a>
      </div>
    </div>
  </footer>

  <script src="/main/scripts/main.js"></script>
  <script src="/main/scripts/shop.js"></script>
  <script>
const menuBtn = document.getElementById('menuBtn');
const mobileMenu = document.getElementById('mobileMenu');
const consultationModal = document.getElementById('consultationModal');
const closeConsultationModal = document.getElementById('closeConsultationModal');
const productForm = document.getElementById('productForm');
const productsGrid = document.getElementById('productsGrid');

if (menuBtn && mobileMenu) {
  menuBtn.addEventListener('click', () => {
    const isOpen = mobileMenu.classList.toggle('open');
    menuBtn.setAttribute('aria-expanded', String(isOpen));
    menuBtn.textContent = isOpen ? '✕' : '☰';
  });

  mobileMenu.querySelectorAll('a').forEach((link) => {
    link.addEventListener('click', () => {
      mobileMenu.classList.remove('open');
      menuBtn.setAttribute('aria-expanded', 'false');
      menuBtn.textContent = '☰';
    });
  });
}

const slides = document.querySelectorAll('.hero-slide');
let current = 0;

setInterval(() => {
  if (!slides.length) return;
  slides[current].classList.remove('active');
  current = (current + 1) % slides.length;
  slides[current].classList.add('active');
}, 5000);

function openConsultationModal() {
  if (!consultationModal) return;
  consultationModal.classList.remove('hidden');
}

function closeConsultationModalFn() {
  if (!consultationModal) return;
  consultationModal.classList.add('hidden');
}

function getStarterProducts() {
  return [
    { image: 'https://images.unsplash.com/photo-1586495777744-4413f21062fa?w=600', name: 'Poppy Dew Lip Gloss', description: 'A luminous gloss for glowing bridal portraits and special occasions.', category: 'Beauty', price: '12,500' },
    { image: 'https://images.unsplash.com/photo-1612817288484-6f916006741a?w=600', name: 'Gilded Glow Shimmer Oil', description: 'A polished shimmer finish for events, photos, and elegant evenings.', category: 'Body', price: '18,000' },
    { image: 'https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?w=600', name: 'Velvet Muse Palette', description: 'Soft matte tones made for flawless bridal and event styling.', category: 'Beauty', price: '25,000' },
    { image: 'https://images.unsplash.com/photo-1556228578-8c89e6adf883?w=600', name: 'Hydra-Flourish Serum', description: 'Hydrating care that keeps your glow fresh before every celebration.', category: 'Skincare', price: '32,000' }
  ];
}

function getProducts() {
  const saved = JSON.parse(localStorage.getItem('flourishProducts') || 'null');
  return Array.isArray(saved) && saved.length ? saved : getStarterProducts();
}

function renderProducts() {
  if (!productsGrid) return;

  const products = getProducts();

  productsGrid.innerHTML = products.map((item) => `
    <article class="product-card rounded-3xl bg-white p-4 shadow-xl hover:-translate-y-1 transition">
      <img src="${item.image}" alt="${item.name}" class="h-56 w-full rounded-2xl object-cover">
      <span class="category mt-4 block text-xs uppercase tracking-[0.25em] text-gray-500">${item.category || 'Beauty'}</span>
      <h3 class="mt-2 text-xl font-semibold text-blue-950">${item.name}</h3>
      
      <p class="price mt-3 text-blue-800 font-semibold"> ₦${item.price || '12,500'}</p>
    </article>
  `).join('');
}

if (productForm && productsGrid) {
  productForm.addEventListener('submit', (event) => {
    event.preventDefault();
    const image = document.getElementById('productImage').value.trim();
    const name = document.getElementById('productName').value.trim();
    const description = document.getElementById('productDescription').value.trim();

    if (!image || !name || !description) return;

    const currentProducts = getProducts();
    const nextProducts = Array.isArray(currentProducts) ? currentProducts.slice() : [];
    nextProducts.unshift({
      image,
      name,
      description,
      category: 'New Upload',
      price: '14,500'
    });

    localStorage.setItem('flourishProducts', JSON.stringify(nextProducts));
    productForm.reset();
    renderProducts();
  });
}

if (consultationModal) {
  document.querySelectorAll('.open-consultation-modal').forEach((button) => {
    button.addEventListener('click', openConsultationModal);
  });

  consultationModal.addEventListener('click', (event) => {
    if (event.target.matches('[data-close-modal="true"]')) {
      closeConsultationModalFn();
    }
  });

  if (closeConsultationModal) {
    closeConsultationModal.addEventListener('click', closeConsultationModalFn);
  }

  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') {
      closeConsultationModalFn();
    }
  });
}

renderProducts();

function sendEmail(event) {
  event.preventDefault();
  const form = event.currentTarget;
  const data = new FormData(form);
  const name = (data.get('name') || 'Client').toString().trim();
  const email = (data.get('email') || '').toString().trim();
  const message = (data.get('message') || '').toString().trim();
  const subject = encodeURIComponent(`New consultation request from ${name}`);
  const body = encodeURIComponent(`Name: ${name}\nEmail: ${email}\n\nMessage:\n${message}`);
  window.location.href = `mailto:flourishpoppies@gmail.com?subject=${subject}&body=${body}`;
  form.reset();
}

const glow = document.createElement('div');
glow.className = 'cursor-glow';
document.body.appendChild(glow);

document.addEventListener('mousemove', (event) => {
  glow.style.setProperty('--x', `${event.clientX}px`);
  glow.style.setProperty('--y', `${event.clientY}px`);
});


function formatPrice(value) {
  return new Intl.NumberFormat('en-NG', {
    style: 'currency',
    currency: 'NGN',
    maximumFractionDigits: 0
  }).format(value);
}

function renderCart() {
  const cart = JSON.parse(localStorage.getItem('flourishCart') || '[]');

  const container = document.getElementById('cartItems');
  const subtotal = document.getElementById('cartSubtotal');
  const count = document.getElementById('cartCount');

  if (!container) return;

  if (cart.length === 0) {
    container.innerHTML = `
      <div class="text-center py-10">
        <h3 class="text-xl font-semibold text-blue-950">
          Your cart is empty
        </h3>
        <a href="shop.html"
           class="mt-4 inline-block bg-blue-800 text-white px-5 py-3 rounded-xl">
           Continue Shopping
        </a>
      </div>
    `;

    subtotal.textContent = formatPrice(0);
    count.textContent = '0 items';
    return;
  }

  let total = 0;

  container.innerHTML = cart.map((item,index) => {

    const itemPrice = Number(item.price || 0);
    const itemTotal = itemPrice * Number(item.qty || 1);
    total += itemTotal;

    return `
      <article class="rounded-3xl border border-amber-100 bg-white p-5 shadow-xl flex flex-col md:flex-row gap-5 md:items-center justify-between">

        <div class="flex gap-4 items-center">
          <img src="${item.image}"
               alt="${item.name}"
               class="h-24 w-24 rounded-2xl object-cover">

          <div>
            <h3 class="text-xl font-semibold text-blue-950">
              ${item.name}
            </h3>

            <p class="text-sm text-gray-600">
              ${item.category}
            </p>

            <p class="text-sm text-blue-800 font-semibold">
              ${formatPrice(Number(item.price || 0))}
            </p>
          </div>
        </div>

        <div class="flex items-center gap-2">

          <button onclick="decreaseQty(${index})"
            class="bg-gray-200 px-3 py-1 rounded">
            -
          </button>

          <span>${item.qty}</span>

          <button onclick="increaseQty(${index})"
            class="bg-gray-200 px-3 py-1 rounded">
            +
          </button>

        </div>

        <div class="font-bold text-blue-900">
          ${formatPrice(itemTotal)}
        </div>

        <button onclick="removeItem(${index})"
          class="bg-red-500 text-white px-3 py-2 rounded-lg">
          Remove
        </button>

      </article>
    `;
  }).join('');

  subtotal.textContent = formatPrice(total);

  const totalItems = cart.reduce((sum,item)=>sum+item.qty,0);
  count.textContent = `${totalItems} item${totalItems > 1 ? 's' : ''}`;
}

function increaseQty(index) {
  const cart = JSON.parse(localStorage.getItem('flourishCart') || '[]');

  cart[index].qty++;

  localStorage.setItem('flourishCart', JSON.stringify(cart));
  renderCart();
}

function decreaseQty(index) {
  const cart = JSON.parse(localStorage.getItem('flourishCart') || '[]');

  if(cart[index].qty > 1){
      cart[index].qty--;
  }

  localStorage.setItem('flourishCart', JSON.stringify(cart));
  renderCart();
}

function removeItem(index) {
  const cart = JSON.parse(localStorage.getItem('flourishCart') || '[]');

  cart.splice(index,1);

  localStorage.setItem('flourishCart', JSON.stringify(cart));
  renderCart();
}

renderCart();
</script>
</body>
</html>
